[package]
name = "omp-desktop-shell"
version = "0.1.0"
description = "Tauri desktop shell for oh-my-pi"
authors = ["Can Boluk"]
license = "MIT"
edition = "2024"
publish = false

# This crate intentionally opts OUT of the root workspace — Tauri ships its own
# pre-built deps and benefits from its own lockfile. Keeping it standalone also
# avoids pulling tauri's tree into the existing pi-* crates' dep graph.
[workspace]

[lib]
name = "omp_desktop_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
] }
anyhow = "1"
once_cell = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
